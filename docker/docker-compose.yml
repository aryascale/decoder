services:
  mysql:
    image: mysql:8.4
    container_name: lumpat-mysql
    restart: always
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: lumpat-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      - mysql

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lumpat-app
    restart: always
    ports:
      - "127.0.0.1:4069:3069"
    environment:
      - DATABASE_URL=mysql://root:lumpat2026@mysql:3306/lumpat_db
      - PORT=3069
      - NODE_ENV=production
    env_file:
      - ../.env
    depends_on:
      - mysql
    volumes:
      - ../uploads:/app/uploads

volumes:
  mysql_data:
